name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  quality:
    name: Lint, testes e build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Formatação
        run: npm run format:check

      - name: Testes
        run: npm run test:ci

      - name: Security Audit
        run: npm run audit:security

      - name: Build
        run: npm run build
